<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Travel Map — Roamr</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
html, body { height: 100%; overflow: hidden; }
.tm-page { padding-top: 68px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.tm-header { padding: 0.85rem 2rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; background: var(--card-bg); gap: 1rem; }
.tm-header-left { display: flex; align-items: center; gap: 1.25rem; }
.tm-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; }
.tm-breadcrumb { display: flex; align-items: center; gap: 0.4rem; font-size: 0.78rem; }
.bc-world { color: var(--muted); cursor: pointer; font-weight: 600; transition: color 0.15s; }
.bc-world:hover { color: var(--white); }
.bc-world.active { color: var(--white); }
.bc-sep { color: var(--border2); }
.bc-country { color: var(--accent); font-weight: 600; display: none; }
.back-btn { display: none; align-items: center; gap: 0.35rem; font-size: 0.72rem; font-weight: 600; color: var(--muted); cursor: pointer; padding: 0.3rem 0.65rem; border: 1px solid var(--border); border-radius: 4px; transition: all 0.15s; background: none; font-family: 'Instrument Sans', sans-serif; letter-spacing: 0.05em; text-transform: uppercase; }
.back-btn:hover { color: var(--white); border-color: var(--border2); }
.back-btn.show { display: flex; }
.tm-layout { flex: 1; display: flex; overflow: hidden; }
.tm-map-area { flex: 1; position: relative; overflow: hidden; }
#travel-map { width: 100%; height: 100%; }

/* Map overlays */
.map-chips { position: absolute; top: 1rem; left: 1rem; z-index: 500; display: flex; gap: 0.5rem; flex-wrap: wrap; pointer-events: none; }
.map-chip { background: rgba(10,10,10,0.88); border: 1px solid var(--border); border-radius: 4px; padding: 0.3rem 0.75rem; font-size: 0.72rem; font-weight: 600; color: var(--white); backdrop-filter: blur(8px); }
.map-chip .cv { color: var(--accent); }
.map-chip .cd { color: #5b9cf6; }
.map-loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 600; background: rgba(10,10,10,0.9); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem 2rem; font-size: 0.82rem; color: var(--muted); display: none; backdrop-filter: blur(12px); }
.map-loading.show { display: block; }

/* Legend */
.map-legend { position: absolute; bottom: 1.25rem; right: 1rem; z-index: 500; background: rgba(10,10,10,0.88); border: 1px solid var(--border); border-radius: 6px; padding: 0.6rem 0.9rem; backdrop-filter: blur(8px); display: flex; flex-direction: column; gap: 0.35rem; }
.leg-row { display: flex; align-items: center; gap: 0.5rem; font-size: 0.65rem; color: var(--muted); font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.leg-sw { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

/* Country detail bar */
.cdb { position: absolute; bottom: 1.25rem; left: 50%; transform: translateX(-50%); z-index: 500; background: rgba(10,10,10,0.92); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.5rem; backdrop-filter: blur(14px); min-width: 260px; max-width: 420px; text-align: center; display: none; }
.cdb.show { display: block; }
.cdb-flag { font-size: 2rem; line-height: 1; margin-bottom: 0.3rem; }
.cdb-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; line-height: 1; }
.cdb-status { font-size: 0.68rem; color: var(--muted); margin-top: 0.2rem; text-transform: uppercase; letter-spacing: 0.1em; }
.cdb-cities { display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center; margin-top: 0.65rem; }
.cdb-city-tag { font-size: 0.68rem; padding: 0.18rem 0.5rem; border-radius: 3px; font-weight: 600; letter-spacing: 0.03em; cursor: default; }
.cdb-city-tag.capital { background: rgba(232,76,43,0.15); color: var(--accent); border: 1px solid rgba(232,76,43,0.25); }
.cdb-city-tag.city { background: rgba(255,255,255,0.06); color: var(--muted); border: 1px solid var(--border); }
.cdb-actions { display: flex; gap: 0.5rem; justify-content: center; margin-top: 0.85rem; }

/* Sidebar */
.tm-sidebar { width: 295px; border-left: 1px solid var(--border); background: var(--card-bg); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.sb-scroll { flex: 1; overflow-y: auto; }
.sb-scroll::-webkit-scrollbar { width: 3px; }
.sb-scroll::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
.sb-sec-hdr { padding: 0.85rem 1.1rem 0.7rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: var(--card-bg); z-index: 5; }
.sb-sec-label { font-size: 0.64rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.16em; color: var(--muted); display: flex; align-items: center; gap: 0.5rem; }
.sb-count { font-family: 'Bebas Neue', sans-serif; font-size: 1.1rem; color: var(--accent); line-height: 1; }
.sb-count.blue { color: #5b9cf6; }
.sb-add { background: none; border: 1px solid var(--border); color: var(--muted); font-size: 0.65rem; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; padding: 0.2rem 0.55rem; border-radius: 3px; cursor: pointer; transition: all 0.15s; font-family: 'Instrument Sans', sans-serif; }
.sb-add:hover { color: var(--white); border-color: var(--border2); }
.sb-divider { height: 1px; background: var(--border); flex-shrink: 0; }
.sb-empty { padding: 1.5rem 1.1rem; text-align: center; }
.sb-empty-icon { font-size: 1.75rem; margin-bottom: 0.5rem; }
.sb-empty-text { font-size: 0.78rem; color: var(--muted); line-height: 1.6; }

/* Country items */
.ci { display: flex; align-items: flex-start; gap: 0.7rem; padding: 0.65rem 1.1rem; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.12s; position: relative; }
.ci:hover { background: rgba(255,255,255,0.025); }
.ci:last-child { border-bottom: none; }
.ci-flag { font-size: 1.3rem; line-height: 1; flex-shrink: 0; margin-top: 0.05rem; }
.ci-info { flex: 1; min-width: 0; }
.ci-name { font-size: 0.84rem; font-weight: 600; color: var(--white); }
.ci-cities { font-size: 0.7rem; color: var(--muted); margin-top: 0.15rem; line-height: 1.4; }
.ci-rm { opacity: 0; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 0.9rem; padding: 0.1rem 0.2rem; transition: all 0.12s; flex-shrink: 0; }
.ci:hover .ci-rm { opacity: 0.6; }
.ci-rm:hover { opacity: 1 !important; color: var(--accent); }

/* Add Country Modal */
.acm-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.75); align-items: center; justify-content: center; padding: 2rem; }
.acm-overlay.open { display: flex; }
.acm-box { background: #141410; border: 1px solid rgba(255,255,255,0.12); border-radius: 12px; padding: 1.75rem; width: 100%; max-width: 400px; position: relative; }
.acm-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; margin-bottom: 0.35rem; }
.acm-sub { font-size: 0.78rem; color: var(--muted); margin-bottom: 1.1rem; }
.acm-type { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
.acm-t-btn { flex: 1; padding: 0.55rem; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Instrument Sans', sans-serif; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: all 0.15s; }
.acm-t-btn.v-active { border-color: rgba(232,76,43,0.5); background: rgba(232,76,43,0.1); color: var(--accent); }
.acm-t-btn.d-active { border-color: rgba(91,156,246,0.5); background: rgba(91,156,246,0.1); color: #5b9cf6; }
.acm-input { width: 100%; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 0.6rem 0.85rem; color: var(--white); font-size: 0.88rem; outline: none; font-family: 'Instrument Sans', sans-serif; transition: border-color 0.2s; margin-bottom: 0.6rem; }
.acm-input:focus { border-color: rgba(232,76,43,0.45); }
.acm-results { max-height: 220px; overflow-y: auto; border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; }
.acm-results:empty { display: none; }
.acm-ri { display: flex; align-items: center; gap: 0.7rem; padding: 0.55rem 0.85rem; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.1s; font-size: 0.85rem; }
.acm-ri:last-child { border-bottom: none; }
.acm-ri:hover { background: rgba(232,76,43,0.1); }
.acm-ri.already { opacity: 0.4; pointer-events: none; }
.acm-ri-flag { font-size: 1.2rem; }
.acm-ri-name { font-weight: 600; color: var(--white); flex: 1; }
.acm-ri-status { font-size: 0.65rem; color: var(--muted); }
.acm-close { position: absolute; top: 0.9rem; right: 1rem; background: none; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; line-height: 1; }
.acm-close:hover { color: var(--white); }
.acm-no-results { padding: 1rem; text-align: center; font-size: 0.8rem; color: var(--muted); }

/* City marker popup */
.city-popup { background: #141410 !important; border: 1px solid rgba(255,255,255,0.12) !important; color: var(--white) !important; border-radius: 6px !important; font-family: 'Instrument Sans', sans-serif !important; }
.city-popup .leaflet-popup-content-wrapper { background: #141410; border: 1px solid rgba(255,255,255,0.12); border-radius: 6px; box-shadow: 0 4px 20px rgba(0,0,0,0.6); padding: 0; }
.city-popup .leaflet-popup-content { margin: 0; }
.city-popup .leaflet-popup-tip { background: #141410; }
.city-popup .leaflet-popup-tip-container { display: none; }
.cp-inner { padding: 0.7rem 0.9rem; }
.cp-name { font-weight: 600; font-size: 0.85rem; color: var(--white); }
.cp-type { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 0.1rem; }
.cp-btn { margin-top: 0.6rem; width: 100%; padding: 0.35rem; border-radius: 3px; font-family: 'Instrument Sans', sans-serif; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; border: 1px solid; transition: all 0.15s; }
.cp-btn.mark { background: rgba(232,76,43,0.1); border-color: rgba(232,76,43,0.3); color: var(--accent); }
.cp-btn.mark:hover { background: rgba(232,76,43,0.2); }
.cp-btn.unmark { background: rgba(255,255,255,0.05); border-color: var(--border); color: var(--muted); }
.cp-btn.unmark:hover { background: rgba(255,255,255,0.1); color: var(--white); }

/* Leaflet overrides */
.leaflet-container { background: #0b0b09; font-family: 'Instrument Sans', sans-serif; }
.leaflet-control-zoom a { background: #1a1a14 !important; border-color: rgba(255,255,255,0.1) !important; color: var(--white) !important; }
.leaflet-control-zoom a:hover { background: #252518 !important; }
.leaflet-control-attribution { background: rgba(8,8,8,0.75) !important; color: #444 !important; font-size: 0.58rem !important; }
.leaflet-control-attribution a { color: #444 !important; }
.lt { background: #1a1a14 !important; border: 1px solid rgba(255,255,255,0.12) !important; color: var(--white) !important; font-family: 'Instrument Sans', sans-serif !important; font-size: 0.78rem !important; border-radius: 4px !important; box-shadow: 0 4px 16px rgba(0,0,0,0.6) !important; padding: 0.3rem 0.55rem !important; white-space: nowrap; }
.lt::before, .lt::after { display: none !important; }
.leaflet-popup-close-button { color: #888 !important; font-size: 1rem !important; top: 6px !important; right: 8px !important; }

@media(max-width:768px) {
  html, body { overflow: auto; }
  .tm-page { height: auto; overflow: auto; }
  .tm-layout { flex-direction: column; }
  .tm-map-area { height: 65vw; min-height: 320px; }
  .tm-sidebar { width: 100%; border-left: none; border-top: 1px solid var(--border); max-height: 50vh; }
}
</style>
</head>

});
const COUNTRY_LIST = Object.values(COUNTRY_BY_ISO2).sort((a, b) => a.name.localeCompare(b.name));

function flag(iso2) {
  if (!iso2 || iso2.length !== 2) return '🌍';
  return [...iso2.toUpperCase()].map(c => String.fromCodePoint(0x1F1E0 + c.charCodeAt(0) - 65)).join('');
}

// ═══ STATE ═══════════════════════════════════════════════════════════
const STORAGE_KEY = 'roamr_travel_map_v1';
function loadState() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) return JSON.parse(s); } catch(e){}
  return { visited: {}, desired: [] };
}
function saveState() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e){} }
let state = loadState();

function getStatus(iso2) {
  if (state.visited[iso2] !== undefined) return 'visited';
  if (state.desired.includes(iso2)) return 'desired';
  return 'none';
}
function addCountry(iso2, type) {
  if (type === 'visited') {
    if (!state.visited[iso2]) state.visited[iso2] = [];
    state.desired = state.desired.filter(c => c !== iso2);
  } else {
    if (!state.desired.includes(iso2)) state.desired.push(iso2);
    delete state.visited[iso2];
  }
  saveState();
  refreshMapStyles();
  renderSidebar();
  updateStats();
  // Re-highlight detail bar if we're viewing this country
  if (currentIso2 === iso2) updateDetailBar(iso2);
}
function removeCountry(iso2) {
  delete state.visited[iso2];
  state.desired = state.desired.filter(c => c !== iso2);
  saveState();
  refreshMapStyles();
  renderSidebar();
  updateStats();
  if (currentIso2 === iso2) updateDetailBar(iso2);
}
function toggleCity(iso2, cityName) {
  if (!state.visited[iso2]) return;
  const idx = state.visited[iso2].indexOf(cityName);
  if (idx >= 0) state.visited[iso2].splice(idx, 1);
  else state.visited[iso2].push(cityName);
  saveState();
  renderSidebar();
  refreshCityMarkers(iso2);
  updateDetailBar(iso2);
}

// ═══ MAP ═════════════════════════════════════════════════════════════
const map = L.map('travel-map', {
  zoomControl: true, scrollWheelZoom: true, minZoom: 1.5, maxZoom: 12
}).setView([20, 5], 2);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '© <a href="https://carto.com/">CartoDB</a>',
  maxZoom: 19
}).addTo(map);

let worldLayer = null;
let subdivLayer = null;
let cityMarkerList = [];
let currentId = null;
let currentIso2 = null;
let currentLayerRef = null;
let layerById = {};
let subdivisionsCache = null;

function countryStyle(feature) {
  const id = String(feature.id);
  const c = COUNTRY_BY_ID[id];
  const status = c ? getStatus(c.iso2) : 'none';
  return {
    fillColor: status === 'visited' ? '#e84c2b' : status === 'desired' ? '#5b9cf6' : '#1d1d18',
    fillOpacity: status === 'visited' ? 0.52 : status === 'desired' ? 0.38 : 0.42,
    color: status === 'none' ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.18)',
    weight: 0.7, opacity: 1
  };
}

async function initMap() {
  document.getElementById('map-loading').classList.add('show');
  try {
    const res = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo = await res.json();
    const countries = topojson.feature(topo, topo.objects.countries);
    worldLayer = L.geoJSON(countries, {
      style: countryStyle,
      onEachFeature: (feature, layer) => {
        const id = String(feature.id);
        layerById[id] = layer;
        const c = COUNTRY_BY_ID[id];
        if (!c) return;
        layer.bindTooltip(`<span style="font-weight:600">${flag(c.iso2)}</span> ${c.name}`, {className:'lt', direction:'auto', sticky:true});
        layer.on('mouseover', () => { if (id !== currentId) layer.setStyle({fillOpacity: Math.min(countryStyle(feature).fillOpacity + 0.3, 0.8), weight: 1.2, color: 'rgba(255,255,255,0.3)'}); });
        layer.on('mouseout',  () => { if (id !== currentId) worldLayer.resetStyle(layer); });
        layer.on('click', () => { if (!currentId) drillInto(id, c, layer); });
      }
    }).addTo(map);
  } catch(e) {
    document.getElementById('map-loading').textContent = 'Map failed to load. Check your connection.';
    document.getElementById('map-loading').classList.add('show');
    return;
  }
  document.getElementById('map-loading').classList.remove('show');
}

async function drillInto(id, country, layer) {
  currentId = id;
  currentIso2 = country.iso2;
  currentLayerRef = layer;

  // UI updates
  document.getElementById('back-btn').classList.add('show');
  document.getElementById('bc-sep').style.display = 'inline';
  document.getElementById('bc-country').style.display = 'inline';
  document.getElementById('bc-country').textContent = country.name;
  document.getElementById('bc-world').classList.remove('active');

  // Disable click on all layers
  if (worldLayer) worldLayer.eachLayer(l => l.off('click'));

  // Zoom to country
  try { map.fitBounds(layer.getBounds(), {padding: [40, 40], maxZoom: 8}); } catch(e){}

  // Highlight selected, dim others
  layer.setStyle({fillOpacity: 0.65, weight: 2, color: 'rgba(255,255,255,0.45)'});
  if (worldLayer) {
    worldLayer.eachLayer(l => {
      if (l !== layer) l.setStyle({fillOpacity: 0.12, color: 'rgba(255,255,255,0.05)'});
    });
  }

  // Show detail bar
  updateDetailBar(country.iso2);

  // Load subdivisions
  await loadSubdivisions(country.iso2);

  // City markers
  showCityMarkers(country.iso2);
}

function resetToWorld() {
  currentId = null;
  currentIso2 = null;
  currentLayerRef = null;

  document.getElementById('back-btn').classList.remove('show');
  document.getElementById('bc-sep').style.display = 'none';
  document.getElementById('bc-country').style.display = 'none';
  document.getElementById('bc-world').classList.add('active');
  document.getElementById('cdb').classList.remove('show');

  // Remove layers
  if (subdivLayer) { map.removeLayer(subdivLayer); subdivLayer = null; }
  cityMarkerList.forEach(m => map.removeLayer(m));
  cityMarkerList = [];

  // Restore styles + re-enable click
  if (worldLayer) {
    worldLayer.setStyle(countryStyle);
    worldLayer.eachLayer(layer => {
      const featureId = Object.keys(layerById).find(k => layerById[k] === layer);
      if (!featureId) return;
      const c = COUNTRY_BY_ID[featureId];
      if (!c) return;
      layer.off('click');
      layer.on('mouseover', () => layer.setStyle({fillOpacity: Math.min(countryStyle({id: featureId}).fillOpacity + 0.3, 0.8), weight: 1.2, color: 'rgba(255,255,255,0.3)'}));
      layer.on('mouseout',  () => worldLayer.resetStyle(layer));
      layer.on('click', () => drillInto(featureId, c, layer));
    });
  }
  map.setView([20, 5], 2, {animate: true, duration: 0.7});
}

function refreshMapStyles() {
  if (!worldLayer) return;
  worldLayer.setStyle(countryStyle);
  if (currentLayerRef && currentId) {
    currentLayerRef.setStyle({fillOpacity: 0.65, weight: 2, color: 'rgba(255,255,255,0.45)'});
  }
}

async function loadSubdivisions(iso2) {
  if (!subdivisionsCache) {
    try {
      document.getElementById('map-loading').textContent = 'Loading regions…';
      document.getElementById('map-loading').classList.add('show');
      const res = await fetch('https://cdn.jsdelivr.net/gh/nvkelso/natural-earth-vector@master/geojson/ne_110m_admin_1_states_provinces.geojson');
      if (res.ok) subdivisionsCache = await res.json();
    } catch(e) { /* fail silently */ }
    document.getElementById('map-loading').classList.remove('show');
  }
  if (!subdivisionsCache || currentIso2 !== iso2) return;

  const features = subdivisionsCache.features.filter(f => {
    const p = f.properties;
    return p.iso_a2 === iso2 || p.adm0_a3 === COUNTRY_BY_ISO2[iso2]?.iso3;
  });
  if (!features.length) return;

  const gj = { type: 'FeatureCollection', features };
  subdivLayer = L.geoJSON(gj, {
    style: {
      fillColor: 'transparent', fillOpacity: 0,
      color: 'rgba(255,255,255,0.22)', weight: 0.8, opacity: 0.8
    },
    onEachFeature: (feature, layer) => {
      const name = feature.properties.name || feature.properties.name_en || '';
      const type = feature.properties.type_en || feature.properties.type || '';
      if (name) layer.bindTooltip(`${name}${type ? ' <span style="opacity:0.5;font-size:0.7em">${type}</span>' : ''}`, {className: 'lt', direction: 'auto', sticky: true});
    }
  }).addTo(map);
}

function makeCityIcon(isCapital, isVisited) {
  const color = isVisited ? '#2bb57d' : (isCapital ? '#e84c2b' : '#f5a623');
  const size = isCapital ? 10 : 7;
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid rgba(255,255,255,0.6);box-shadow:0 0 8px ${color}99;transition:all 0.2s"></div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2]
  });
}

function showCityMarkers(iso2) {
  cityMarkerList.forEach(m => map.removeLayer(m));
  cityMarkerList = [];
  const cities = CITIES[iso2] || [];
  cities.forEach(([name, lat, lng, isCapital, rank]) => {
    const visited = (state.visited[iso2] || []).includes(name);
    const marker = L.marker([lat, lng], {icon: makeCityIcon(isCapital, visited)});
    const cityType = isCapital ? 'Capital' : `${['', '2nd', '3rd'][rank] || rank + 'th'} city`;
    const visitedState = (state.visited[iso2] || []).includes(name);
    marker.bindPopup(() => buildCityPopup(iso2, name, isCapital, cityType), {
      className: 'city-popup', maxWidth: 200, closeButton: true
    });
    marker.addTo(map);
    cityMarkerList.push(marker);
  });
}

function buildCityPopup(iso2, cityName, isCapital, cityType) {
  const visited = (state.visited[iso2] || []).includes(cityName);
  const canMark = state.visited[iso2] !== undefined;
  const div = document.createElement('div');
  div.className = 'cp-inner';
  div.innerHTML = `
    <div class="cp-name">${cityName}</div>
    <div class="cp-type">${cityType}</div>
    ${canMark ? `<button class="cp-btn ${visited ? 'unmark' : 'mark'}" onclick="toggleCity('${iso2}','${cityName.replace(/'/g,"\\'")}');this.closest('.leaflet-popup').querySelector('.leaflet-popup-close-button').click()">${visited ? '✓ Visited — unmark' : '+ Mark as visited'}</button>` : `<div style="font-size:0.68rem;color:var(--muted);margin-top:0.5rem">Add country as visited to track cities</div>`}
  `;
  return div;
}

function refreshCityMarkers(iso2) {
  if (currentIso2 === iso2) showCityMarkers(iso2);
}

function updateDetailBar(iso2) {
  const c = COUNTRY_BY_ISO2[iso2];
  if (!c) return;
  const status = getStatus(iso2);
  const visitedCities = state.visited[iso2] || [];
  const allCities = CITIES[iso2] || [];

  const statusLabel = status === 'visited'
    ? `<span style="color:#2bb57d">Visited ✓</span>${visitedCities.length ? ` · ${visitedCities.length} cit${visitedCities.length > 1 ? 'ies' : 'y'} logged` : ''}`
    : status === 'desired' ? '<span style="color:#5b9cf6">Dream Destination</span>'
    : '<span style="color:var(--muted)">Not yet explored</span>';

  const cityTags = allCities.map(([name, ,, isCapital]) => {
    const isVisited = visitedCities.includes(name);
    return `<span class="cdb-city-tag ${isCapital ? 'capital' : 'city'}" style="${isVisited ? 'border-color:#2bb57d;color:#2bb57d;background:rgba(43,181,125,0.12)' : ''}">${isCapital ? '★ ' : ''}${name}${isVisited ? ' ✓' : ''}</span>`;
  }).join('');

  const actions = status === 'visited'
    ? `<button class="btn btn-ghost btn-sm" onclick="removeCountry('${iso2}')">Remove</button>`
    : status === 'desired'
      ? `<button class="btn btn-primary btn-sm" onclick="addCountry('${iso2}','visited')">Mark Visited</button><button class="btn btn-ghost btn-sm" onclick="removeCountry('${iso2}')">Remove</button>`
      : `<button class="btn btn-primary btn-sm" onclick="addCountry('${iso2}','visited')">+ Mark Visited</button><button class="btn btn-ghost btn-sm" onclick="addCountry('${iso2}','desired')">+ Dream Destination</button>`;

  document.getElementById('cdb').innerHTML = `
    <div class="cdb-flag">${flag(iso2)}</div>
    <div class="cdb-name">${c.name}</div>
    <div class="cdb-status">${statusLabel}</div>
    ${allCities.length ? `<div class="cdb-cities">${cityTags}</div>` : ''}
    <div class="cdb-actions">${actions}</div>
  `;
  document.getElementById('cdb').classList.add('show');
}

// ═══ SIDEBAR ═════════════════════════════════════════════════════════
function renderSidebar() {
  // Visited
  const visitedIso2s = Object.keys(state.visited);
  document.getElementById('sb-v-count').textContent = visitedIso2s.length;
  const vEl = document.getElementById('visited-list');
  if (!visitedIso2s.length) {
    vEl.innerHTML = `<div class="sb-empty"><div class="sb-empty-icon">🗺️</div><p class="sb-empty-text">No countries visited yet.<br>Click on the map or use + Add.</p></div>`;
  } else {
    vEl.innerHTML = visitedIso2s.sort((a,b) => {
      const na = COUNTRY_BY_ISO2[a]?.name || a;
      const nb = COUNTRY_BY_ISO2[b]?.name || b;
      return na.localeCompare(nb);
    }).map(iso2 => {
      const c = COUNTRY_BY_ISO2[iso2];
      const name = c?.name || iso2;
      const cities = state.visited[iso2] || [];
      return `<div class="ci" onclick="focusCountry('${iso2}')">
        <div class="ci-flag">${flag(iso2)}</div>
        <div class="ci-info">
          <div class="ci-name">${name}</div>
          ${cities.length ? `<div class="ci-cities">${cities.join(', ')}</div>` : ''}
        </div>
        <button class="ci-rm" title="Remove" onclick="event.stopPropagation();removeCountry('${iso2}')">×</button>
      </div>`;
    }).join('');
  }

  // Desired
  document.getElementById('sb-d-count').textContent = state.desired.length;
  const dEl = document.getElementById('desired-list');
  if (!state.desired.length) {
    dEl.innerHTML = `<div class="sb-empty"><div class="sb-empty-icon">✨</div><p class="sb-empty-text">No dream destinations yet.<br>Add countries you want to explore.</p></div>`;
  } else {
    dEl.innerHTML = [...state.desired].sort((a,b) => {
      const na = COUNTRY_BY_ISO2[a]?.name || a;
      const nb = COUNTRY_BY_ISO2[b]?.name || b;
      return na.localeCompare(nb);
    }).map(iso2 => {
      const c = COUNTRY_BY_ISO2[iso2];
      const name = c?.name || iso2;
      return `<div class="ci" onclick="focusCountry('${iso2}')">
        <div class="ci-flag">${flag(iso2)}</div>
        <div class="ci-info"><div class="ci-name">${name}</div></div>
        <button class="ci-rm" title="Remove" onclick="event.stopPropagation();removeCountry('${iso2}')">×</button>
      </div>`;
    }).join('');
  }
}

function updateStats() {
  document.getElementById('stat-visited').textContent = Object.keys(state.visited).length;
  document.getElementById('stat-desired').textContent = state.desired.length;
}

function focusCountry(iso2) {
  const entry = COUNTRY_BY_ISO2[iso2];
  if (!entry) return;
  const id = entry.id;
  const layer = layerById[id];
  if (!layer) return;
  if (currentId) resetToWorld();
  setTimeout(() => drillInto(id, entry, layer), currentId ? 800 : 0);
}

// ═══ ADD MODAL ═══════════════════════════════════════════════════════
let modalType = 'visited';
function openAddModal(type) {
  modalType = type;
  setModalType(type);
  document.getElementById('acm-search').value = '';
  document.getElementById('acm-overlay').classList.add('open');
  filterAcm('');
  setTimeout(() => document.getElementById('acm-search').focus(), 100);
}
function closeAddModal() { document.getElementById('acm-overlay').classList.remove('open'); }
function setModalType(type) {
  modalType = type;
  document.getElementById('acm-t-visited').className = 'acm-t-btn' + (type === 'visited' ? ' v-active' : '');
  document.getElementById('acm-t-desired').className = 'acm-t-btn' + (type === 'desired' ? ' d-active' : '');
  document.getElementById('acm-title').textContent = type === 'visited' ? 'Add Visited Country' : 'Add Dream Destination';
  document.getElementById('acm-sub').textContent = type === 'visited' ? 'Countries you have already been to' : 'Countries you want to visit someday';
}
function filterAcm(q) {
  const query = q.toLowerCase().trim();
  const filtered = query
    ? COUNTRY_LIST.filter(c => c.name.toLowerCase().includes(query) || c.iso2.toLowerCase().includes(query))
    : COUNTRY_LIST.slice(0, 60);
  const el = document.getElementById('acm-results');
  if (!filtered.length) {
    el.innerHTML = `<div class="acm-no-results">No countries found</div>`;
    return;
  }
  el.innerHTML = filtered.slice(0, 80).map(c => {
    const status = getStatus(c.iso2);
    const already = status !== 'none';
    const statusText = status === 'visited' ? 'Visited' : status === 'desired' ? 'Dream destination' : '';
    return `<div class="acm-ri${already ? ' already' : ''}" onclick="selectCountryFromModal('${c.iso2}')">
      <span class="acm-ri-flag">${flag(c.iso2)}</span>
      <span class="acm-ri-name">${c.name}</span>
      ${statusText ? `<span class="acm-ri-status">${statusText}</span>` : ''}
    </div>`;
  }).join('');
}
function selectCountryFromModal(iso2) {
  addCountry(iso2, modalType);
  closeAddModal();
}

// ═══ INIT ═════════════════════════════════════════════════════════════
renderSidebar();
updateStats();
initMap();

// Close modal on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAddModal(); });
</script>
